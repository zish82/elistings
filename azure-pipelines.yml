# trigger:
#   branches:
#     include:
#       - main

pr: none

variables:
  imageName: directshop
  webAppStagingSlot: staging
  # Set these in Azure DevOps pipeline variables (or variable group):
  # azureServiceConnection, azureResourceGroup, webAppName, acrName, acrLoginServer

stages:
  - stage: BuildAndPush
    displayName: Build and Push Image
    jobs:
      - job: BuildPush
        displayName: Build and Push Docker Image to ACR
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: BuildAndPushImage
            displayName: Build and push image to ACR
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az acr login --name $(acrName)

                IMAGE_TAG="$(Build.SourceVersion)"

                docker build -f Dockerfile \
                  -t $(acrLoginServer)/$(imageName):${IMAGE_TAG} \
                  -t $(acrLoginServer)/$(imageName):latest \
                  .

                docker push $(acrLoginServer)/$(imageName):${IMAGE_TAG}
                docker push $(acrLoginServer)/$(imageName):latest

                echo "##vso[task.setvariable variable=imageTag;isOutput=true]${IMAGE_TAG}"

  - stage: DeployStaging
    displayName: Deploy to Staging Slot
    dependsOn: BuildAndPush
    variables:
      imageTag: $[ stageDependencies.BuildAndPush.BuildPush.outputs['BuildAndPushImage.imageTag'] ]
    jobs:
      - deployment: DeployToStaging
        displayName: Deploy to staging slot
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Set staging slot image and restart
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      ACR_USER=$(az acr credential show --name $(acrName) --query username -o tsv)
                      ACR_PASS=$(az acr credential show --name $(acrName) --query passwords[0].value -o tsv)

                      az webapp config container set \
                        --resource-group $(azureResourceGroup) \
                        --name $(webAppName) \
                        --slot $(webAppStagingSlot) \
                        --docker-custom-image-name $(acrLoginServer)/$(imageName):$(imageTag) \
                        --docker-registry-server-url https://$(acrLoginServer) \
                        --docker-registry-server-user "$ACR_USER" \
                        --docker-registry-server-password "$ACR_PASS"

                      az webapp restart \
                        --resource-group $(azureResourceGroup) \
                        --name $(webAppName) \
                        --slot $(webAppStagingSlot)

  - stage: SwapToProduction
    displayName: Swap Staging to Production
    dependsOn: DeployStaging
    condition: succeeded()
    jobs:
      - deployment: Promote
        displayName: Promote via slot swap
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Swap slot
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      az webapp deployment slot swap \
                        --resource-group $(azureResourceGroup) \
                        --name $(webAppName) \
                        --slot $(webAppStagingSlot) \
                        --target-slot production
