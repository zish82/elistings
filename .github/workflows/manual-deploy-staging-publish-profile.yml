name: Manual | Build and Deploy to Staging Slot (Publish Profile)

on:
  workflow_dispatch:

env:
  IMAGE_NAME: directshop

jobs:
  build-and-deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ vars.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy image to staging slot with publish profile
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: ${{ vars.AZURE_WEBAPP_STAGING_SLOT }}
          publish-profile: ${{ vars.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}
          images: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Warm up staging slot (best effort)
        shell: bash
        run: |
          set +e
          curl -sS -m 30 "https://${{ vars.AZURE_WEBAPP_NAME }}-${{ vars.AZURE_WEBAPP_STAGING_SLOT }}.azurewebsites.net" > /dev/null
          set -e

      - name: Deployment URL
        run: 'echo "Staging deployed: https://${{ vars.AZURE_WEBAPP_NAME }}-${{ vars.AZURE_WEBAPP_STAGING_SLOT }}.azurewebsites.net"'
