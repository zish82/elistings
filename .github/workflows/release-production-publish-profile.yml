name: Release Production (Publish Profile)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to deploy to production (latest or a previous commit SHA)
        required: true
        default: latest

env:
  IMAGE_NAME: directshop

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy selected image to production with publish profile
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PROD_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}

      - name: Warm up production (best effort)
        shell: bash
        run: |
          set +e
          curl -sS -m 30 "https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net" > /dev/null
          set -e

      - name: Production URL
        run: echo "Production deployed: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
