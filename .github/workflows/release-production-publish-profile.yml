name: Manual | Release Production (Publish Profile)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to deploy to production (latest or a previous commit SHA)
        required: true
        default: latest

env:
  IMAGE_NAME: directshop

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ vars.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Resolve image tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            tag="${{ github.event.inputs.image_tag }}"
          fi
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy selected image to production with publish profile
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PROD_PUBLISH_PROFILE }}
          images: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.image_tag }}

      - name: Warm up production (best effort)
        shell: bash
        run: |
          set +e
          curl -sS -m 30 "https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net" > /dev/null
          set -e

      - name: Production URL
        run: 'echo "Production deployed: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"'
