name: Promote Staging Slot to Production

on:
  workflow_dispatch:
    inputs:
      source_slot:
        description: Slot name to swap from
        required: true
        default: staging

env:
  IMAGE_NAME: directshop

jobs:
  swap:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap slot into production
        shell: bash
        run: |
          set -euo pipefail
          az webapp deployment slot swap \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --slot "${{ github.event.inputs.source_slot }}" \
            --target-slot production

          echo "Promotion complete: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
