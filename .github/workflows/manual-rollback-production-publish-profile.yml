name: Manual | Rollback Production (Publish Profile)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to roll back to (for example, a previous commit SHA)
        required: true

env:
  IMAGE_NAME: directshop

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy selected image to production with publish profile
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PROD_PUBLISH_PROFILE }}
          images: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}

      - name: Warm up production (best effort)
        shell: bash
        run: |
          set +e
          curl -sS -m 30 "https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net" > /dev/null
          set -e

      - name: Production URL
        run: echo "Rollback complete: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
