name: Rollback Production via Staging Slot

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag to roll back to (for example, a previous commit SHA)
        required: true

env:
  IMAGE_NAME: directshop

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy selected image to staging slot
        shell: bash
        run: |
          set -euo pipefail
          az webapp config container set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --slot "${{ secrets.AZURE_WEBAPP_STAGING_SLOT }}" \
            --docker-custom-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}" \
            --docker-registry-server-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
            --docker-registry-server-user "${{ secrets.ACR_USERNAME }}" \
            --docker-registry-server-password "${{ secrets.ACR_PASSWORD }}"

          az webapp restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --slot "${{ secrets.AZURE_WEBAPP_STAGING_SLOT }}"

      - name: Warm up staging slot (best effort)
        shell: bash
        run: |
          set +e
          curl -sS -m 30 "https://${{ secrets.AZURE_WEBAPP_NAME }}-${{ secrets.AZURE_WEBAPP_STAGING_SLOT }}.azurewebsites.net" > /dev/null
          set -e

      - name: Swap staging into production
        shell: bash
        run: |
          set -euo pipefail
          az webapp deployment slot swap \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --slot "${{ secrets.AZURE_WEBAPP_STAGING_SLOT }}" \
            --target-slot production

          echo "Rollback complete: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
